<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundRect128">
      <rect width="128" height="128" rx="23" ry="23"/>
    </clipPath>
    <clipPath id="crossClip128">
      <!-- Vertical bar -->
      <rect x="46" y="6" 
            width="36" height="115" 
            rx="9" />
      <!-- Horizontal bar -->
      <rect x="6" y="46" 
            width="115" height="36" 
            rx="9" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="23" ry="23" fill="url(#bgGrad128)"/>
  
  <!-- Cross shape (white) -->
  <g clip-path="url(#crossClip128)">
    <rect width="128" height="128" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Blue S-curve accent on the cross -->
  <path 
    d="M 67 12 
       C 67 12, 
         95 32, 
         77 58 
       C 59 83, 
         83 101, 
         74 116"
    stroke="#1a56db" 
    stroke-width="7" 
    stroke-linecap="round" 
    fill="none"
    opacity="0.9"
    clip-path="url(#crossClip128)"
  />
  
  <!-- SVMS text label at bottom (only for larger icons) -->
  
  <text 
    x="64" 
    y="119" 
    text-anchor="middle" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="11" 
    font-weight="800" 
    fill="white" 
    opacity="0.9"
    letter-spacing="2"
  >SVMS</text>
  
</svg>