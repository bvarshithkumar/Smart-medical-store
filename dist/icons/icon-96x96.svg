<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad96" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad96" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundRect96">
      <rect width="96" height="96" rx="17" ry="17"/>
    </clipPath>
    <clipPath id="crossClip96">
      <!-- Vertical bar -->
      <rect x="35" y="5" 
            width="27" height="86" 
            rx="7" />
      <!-- Horizontal bar -->
      <rect x="5" y="35" 
            width="86" height="27" 
            rx="7" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="96" height="96" rx="17" ry="17" fill="url(#bgGrad96)"/>
  
  <!-- Cross shape (white) -->
  <g clip-path="url(#crossClip96)">
    <rect width="96" height="96" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Blue S-curve accent on the cross -->
  <path 
    d="M 50 9 
       C 50 9, 
         71 24, 
         58 43 
       C 44 62, 
         62 76, 
         55 87"
    stroke="#1a56db" 
    stroke-width="5" 
    stroke-linecap="round" 
    fill="none"
    opacity="0.9"
    clip-path="url(#crossClip96)"
  />
  
  <!-- SVMS text label at bottom (only for larger icons) -->
  
</svg>