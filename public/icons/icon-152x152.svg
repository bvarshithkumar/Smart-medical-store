    opacity="0.9"
    clip-path="url(#crossClip152)"
  />
  
  <!-- SVMS text label at bottom (only for larger icons) -->
  
  <text 
    x="76" 
    y="141" 
    text-anchor="middle" 
    font-family="Arial, Helvetica, sans-serif" 
