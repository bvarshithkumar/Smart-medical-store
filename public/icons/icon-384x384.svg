<?xml version="1.0" encoding="UTF-8"?>
<svg width="384" height="384" viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad384" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad384" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundRect384">
      <rect width="384" height="384" rx="69" ry="69"/>
    </clipPath>
    <clipPath id="crossClip384">
      <!-- Vertical bar -->
      <rect x="138" y="19" 
            width="108" height="346" 
            rx="27" />
      <!-- Horizontal bar -->
      <rect x="19" y="138" 
            width="346" height="108" 
            rx="27" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="384" height="384" rx="69" ry="69" fill="url(#bgGrad384)"/>
  
  <!-- Cross shape (white) -->
  <g clip-path="url(#crossClip384)">
    <rect width="384" height="384" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Blue S-curve accent on the cross -->
  <path 
    d="M 202 35 
       C 202 35, 
         284 96, 
         230 173 
       C 177 250, 
         250 303, 
         221 349"
    stroke="#1a56db" 
    stroke-width="21" 
    stroke-linecap="round" 
    fill="none"
