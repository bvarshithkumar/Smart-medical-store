    clip-path="url(#crossClip384)"
  />
  
  <!-- SVMS text label at bottom (only for larger icons) -->
  
  <text 
    x="192" 
    y="357" 
    text-anchor="middle" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="33" 
