<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundRect512">
      <rect width="512" height="512" rx="92" ry="92"/>
    </clipPath>
    <clipPath id="crossClip512">
      <!-- Vertical bar -->
      <rect x="184" y="26" 
            width="143" height="461" 
            rx="36" />
      <!-- Horizontal bar -->
      <rect x="26" y="184" 
            width="461" height="143" 
            rx="36" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bgGrad512)"/>
  
  <!-- Cross shape (white) -->
  <g clip-path="url(#crossClip512)">
    <rect width="512" height="512" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Blue S-curve accent on the cross -->
  <path 
    d="M 269 46 
       C 269 46, 
         379 128, 
         307 230 
       C 236 333, 
         333 404, 
         294 466"
    stroke="#1a56db" 
    stroke-width="28" 
    stroke-linecap="round" 
    fill="none"
    opacity="0.9"
    clip-path="url(#crossClip512)"
  />
  
  <!-- SVMS text label at bottom (only for larger icons) -->
  
  <text 
    x="256" 
    y="476" 
    text-anchor="middle" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="44" 
    font-weight="800" 
